<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SparkBot Car Control</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f6;
      --surface: #ffffff;
      --line: #d7dfdf;
      --text: #172026;
      --muted: #607077;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --warn: #b7791f;
      --bad: #b42318;
      --ok: #15803d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1080px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: 0;
    }

    .pill {
      min-width: 128px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: var(--surface);
      font-weight: 760;
      text-align: center;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px 10px;
      font-size: 14px;
    }

    .status-grid span:nth-child(odd) {
      color: var(--muted);
    }

    .pad-wrap {
      display: grid;
      grid-template-columns: minmax(220px, 320px) 1fr;
      gap: 16px;
      align-items: center;
    }

    .pad {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), #d9e2e2 50%, transparent calc(50% + 1px)),
        linear-gradient(0deg, transparent calc(50% - 1px), #d9e2e2 50%, transparent calc(50% + 1px)),
        #eef4f3;
      touch-action: none;
      user-select: none;
    }

    .stick {
      position: absolute;
      width: 70px;
      height: 70px;
      left: calc(50% - 35px);
      top: calc(50% - 35px);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.25);
      pointer-events: none;
      transform: translate(0, 0);
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 52px);
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:active,
    button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .stop {
      background: #fff5f5;
      color: var(--bad);
    }

    .slider-row {
      display: grid;
      grid-template-columns: 72px 1fr 48px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .message {
      min-height: 22px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .ok {
      color: var(--ok);
    }

    .warn {
      color: var(--warn);
    }

    .bad {
      color: var(--bad);
    }

    @media (max-width: 820px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .pill {
        text-align: left;
      }

      .layout,
      .pad-wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>SparkBot Car Control</h1>
      <div id="wsState" class="pill warn">CONNECTING</div>
    </header>

    <div class="layout">
      <section>
        <h2>运动控制</h2>
        <div class="pad-wrap">
          <div id="pad" class="pad">
            <div id="stick" class="stick"></div>
          </div>
          <div>
            <div class="dpad">
              <span></span>
              <button data-x="0" data-y="1">↑</button>
              <span></span>
              <button data-x="-1" data-y="0">←</button>
              <button id="stopBtn" class="stop">■</button>
              <button data-x="1" data-y="0">→</button>
              <span></span>
              <button data-x="0" data-y="-1">↓</button>
              <span></span>
            </div>
            <div class="slider-row">
              <span>速度</span>
              <input id="speed" type="range" min="20" max="100" value="70">
              <strong id="speedText">70%</strong>
            </div>
            <div id="moveMsg" class="message"></div>
          </div>
        </div>
      </section>

      <section>
        <h2>灯光模式</h2>
        <div class="mode-grid" id="lightModes"></div>
        <div class="tools">
          <button id="danceBtn">Dance</button>
          <button id="trimLeft">Trim -</button>
          <button id="trimRight">Trim +</button>
        </div>
        <div id="lightMsg" class="message"></div>
      </section>

      <section style="grid-column: 1 / -1;">
        <h2>设备状态</h2>
        <div class="status-grid">
          <span>控制热点</span><strong id="apSsid">--</strong>
          <span>访问地址</span><strong id="apIp">--</strong>
          <span>连接设备</span><strong id="clients">--</strong>
          <span>运动向量</span><strong id="vector">--</strong>
          <span>灯光模式</span><strong id="lightMode">--</strong>
          <span>最近命令</span><strong id="lastCommand">--</strong>
        </div>
        <div id="statusMsg" class="message"></div>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const pad = $('pad');
    const stick = $('stick');
    const wsState = $('wsState');
    const speed = $('speed');
    const speedText = $('speedText');
    const lightModes = [
      { mode: 2, label: 'A Solid' },
      { mode: 3, label: 'B Breath' },
      { mode: 4, label: 'C Blink' },
      { mode: 5, label: 'D Flow' },
      { mode: 6, label: 'E Show' },
      { mode: 7, label: 'F Sleep' }
    ];

    let ws = null;
    let joystickActive = false;
    let holdTimer = null;
    let lastRawX = 0;
    let lastRawY = 0;
    let lastMoveSentAt = 0;
    let trim = 0;

    function setMessage(el, text, type = '') {
      el.className = 'message ' + type;
      el.textContent = text;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function scaled(value) {
      return clamp(value * Number(speed.value) / 100, -1, 1);
    }

    function sendWs(text) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(text);
        return true;
      }
      return false;
    }

    async function postForm(path, data) {
      const body = new URLSearchParams(data);
      const res = await fetch(path, { method: 'POST', body });
      const json = await res.json();
      if (!res.ok || json.ok === false) {
        throw new Error(json.message || res.statusText);
      }
      return json;
    }

    async function sendMove(x, y, force = false) {
      const now = Date.now();
      if (!force && now - lastMoveSentAt < 80) {
        return;
      }
      lastMoveSentAt = now;
      lastRawX = x;
      lastRawY = y;
      const sx = scaled(x + trim);
      const sy = scaled(y);
      const command = `x${sx.toFixed(2)} y${sy.toFixed(2)}`;
      if (!sendWs(command)) {
        await postForm('/api/move', { x: sx, y: sy, speed: 100 });
      }
      setMessage($('moveMsg'), command);
    }

    async function stopMove() {
      lastRawX = 0;
      lastRawY = 0;
      lastMoveSentAt = 0;
      stick.style.transform = 'translate(0px, 0px)';
      if (!sendWs('stop')) {
        await postForm('/api/stop', {});
      }
      setMessage($('moveMsg'), 'x0.00 y0.00');
    }

    function padVector(event) {
      const rect = pad.getBoundingClientRect();
      const radius = rect.width / 2;
      const cx = rect.left + radius;
      const cy = rect.top + radius;
      const dx = clamp(event.clientX - cx, -radius, radius);
      const dy = clamp(event.clientY - cy, -radius, radius);
      const distance = Math.min(1, Math.hypot(dx, dy) / radius);
      const angle = Math.atan2(dy, dx);
      const x = Math.cos(angle) * distance;
      const y = -Math.sin(angle) * distance;
      stick.style.transform = `translate(${x * radius * 0.72}px, ${-y * radius * 0.72}px)`;
      return { x, y };
    }

    pad.addEventListener('pointerdown', (event) => {
      joystickActive = true;
      pad.setPointerCapture(event.pointerId);
      const v = padVector(event);
      sendMove(v.x, v.y, true);
    });

    pad.addEventListener('pointermove', (event) => {
      if (!joystickActive) return;
      const v = padVector(event);
      sendMove(v.x, v.y);
    });

    function endJoystick() {
      if (!joystickActive) return;
      joystickActive = false;
      stopMove();
    }

    pad.addEventListener('pointerup', endJoystick);
    pad.addEventListener('pointercancel', endJoystick);
    pad.addEventListener('pointerleave', endJoystick);

    document.querySelectorAll('[data-x][data-y]').forEach((btn) => {
      const x = Number(btn.dataset.x);
      const y = Number(btn.dataset.y);
      const start = () => {
        btn.classList.add('active');
        sendMove(x, y, true);
        holdTimer = setInterval(() => sendMove(x, y, true), 120);
      };
      const stop = () => {
        btn.classList.remove('active');
        if (holdTimer) clearInterval(holdTimer);
        holdTimer = null;
        stopMove();
      };
      btn.addEventListener('pointerdown', start);
      btn.addEventListener('pointerup', stop);
      btn.addEventListener('pointercancel', stop);
      btn.addEventListener('pointerleave', stop);
    });

    $('stopBtn').addEventListener('click', stopMove);

    speed.addEventListener('input', () => {
      speedText.textContent = `${speed.value}%`;
      if (lastRawX || lastRawY) sendMove(lastRawX, lastRawY, true);
    });

    lightModes.forEach((item) => {
      const btn = document.createElement('button');
      btn.textContent = item.label;
      btn.addEventListener('click', async () => {
        try {
          if (!sendWs(`w${item.mode}`)) {
            await postForm('/api/light', { mode: item.mode });
          }
          setMessage($('lightMsg'), `w${item.mode}`, 'ok');
        } catch (err) {
          setMessage($('lightMsg'), err.message, 'bad');
        }
      });
      $('lightModes').appendChild(btn);
    });

    $('danceBtn').addEventListener('click', async () => {
      if (!sendWs('d1')) {
        await postForm('/api/dance', { mode: 1 });
      }
      setMessage($('lightMsg'), 'd1', 'ok');
    });

    $('trimLeft').addEventListener('click', async () => {
      trim = clamp(trim - 0.02, -0.2, 0.2);
      const value = -0.02;
      if (!sendWs(`c${value.toFixed(2)}`)) {
        await postForm('/api/correction', { value });
      }
      setMessage($('lightMsg'), `trim ${trim.toFixed(2)}`);
    });

    $('trimRight').addEventListener('click', async () => {
      trim = clamp(trim + 0.02, -0.2, 0.2);
      const value = 0.02;
      if (!sendWs(`c${value.toFixed(2)}`)) {
        await postForm('/api/correction', { value });
      }
      setMessage($('lightMsg'), `trim ${trim.toFixed(2)}`);
    });

    async function refreshStatus() {
      try {
        const s = await (await fetch('/api/status')).json();
        $('apSsid').textContent = s.ap_ssid || '--';
        $('apIp').textContent = s.ap_ip || '--';
        $('clients').textContent = s.clients;
        $('vector').textContent = `x${Number(s.x).toFixed(2)} y${Number(s.y).toFixed(2)}`;
        $('lightMode').textContent = s.light_mode;
        $('lastCommand').textContent = s.last_command || '--';
        setMessage($('statusMsg'), `seq ${s.motion_seq}, moving ${s.moving ? 'yes' : 'no'}`);
      } catch (err) {
        setMessage($('statusMsg'), err.message, 'bad');
      }
    }

    function connectWs() {
      const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${scheme}//${location.host}/ws`);

      ws.onopen = () => {
        wsState.textContent = 'ONLINE';
        wsState.className = 'pill ok';
        setMessage($('moveMsg'), 'WebSocket ready', 'ok');
      };

      ws.onclose = () => {
        wsState.textContent = 'RETRY';
        wsState.className = 'pill warn';
        setTimeout(connectWs, 1000);
      };

      ws.onerror = () => {
        wsState.textContent = 'ERROR';
        wsState.className = 'pill bad';
      };
    }

    connectWs();
    refreshStatus();
    setInterval(refreshStatus, 1000);
    setInterval(() => sendWs('PING'), 500);
  </script>
</body>
</html>
